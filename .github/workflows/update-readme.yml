name: Update Coding Stats

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest stats
        run: curl -sf "https://raw.githubusercontent.com/pittsjs/code-clock/main/stats.json" -o stats.json

      - name: Generate stats block
        run: python3 .github/scripts/generate_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update coding stats [skip ci]"
          git push
