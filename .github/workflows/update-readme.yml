name: Update Coding Stats

on:
  schedule:
    # 1:30 PM & 8:30 PM US Eastern (America/New_York). GitHub cron is UTC-only.
    # These two lines match local clocks during EDT (~Mar–Nov): 17:30 UTC = 13:30 EDT, 00:30 UTC = 20:30 EDT.
    # When EST is in effect (~Nov–Mar), use 18:30 and 01:30 UTC instead for the same local times.
    - cron: '30 17 * * *'
    - cron: '30 0 * * *'
  workflow_dispatch:
  # Fired automatically by code-clock after each successful stats.json push (see push_stats.sh + `gh`).
  repository_dispatch:
    types: [coding-stats-updated]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sfL \
            -H "Accept: application/vnd.github.v3.raw" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/pittsjs/code-clock/contents/stats.json?ref=main" \
            -o stats.json

      - name: Generate stats block
        run: python3 .github/scripts/generate_stats.py

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          LAST=""
          while IFS= read -r subj; do
            if [[ "$subj" =~ ^([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              LAST="${BASH_REMATCH[1]}"
              break
            fi
          done < <(git log --pretty=%s -150)
          if [ -z "$LAST" ]; then
            NEXT="1.0.0"
          else
            NEXT=$(echo "$LAST" | awk -F. '{print $1"."$2"."$3+1}')
          fi
          git commit -m "${NEXT} - Chore: update coding stats [skip ci]"
          git push
